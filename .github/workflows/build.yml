name: Build img4 for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build_windows:
    name: Windows Build
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            diffutils
            perl
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            
      - name: Patch img4lib for Windows
        shell: msys2 {0}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("libvfs/vfs_file.c")
          text = path.read_text()

          text = text.replace(
              '#include "vfs.h"',
              '''#ifdef _WIN32
          #include <io.h>
          #define fsync _commit
          #endif

          #include "vfs.h"'''
          )

          path.write_text(text)
          PY

          grep -n -A6 -B3 "_commit" libvfs/vfs_file.c

      - name: Show toolchain information
        shell: msys2 {0}
        run: |
          set -eux
          gcc --version
          make --version
          pkg-config --version
          pkg-config --modversion openssl
          git submodule status

      - name: Build bundled LZFSE
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          make -C lzfse clean || true

          make -C lzfse -j1 \
            CC=gcc \
            LD=gcc

          echo "LZFSE build output:"
          find lzfse -maxdepth 3 -type f \
            \( -name '*.a' -o -name '*.dll' -o -name '*.o' \) \
            -print

      - name: Build img4
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          make clean || true

          make -j1 \
            CC=gcc \
            LD=gcc

      - name: Locate executable
        shell: msys2 {0}
        run: |
          set -eux

          echo "Repository root:"
          ls -la

          echo "Executable candidates:"
          find . -maxdepth 3 -type f \
            \( -name 'img4' -o -name 'img4.exe' \) \
            -print

          if [ -f img4.exe ]; then
            file img4.exe
          elif [ -f img4 ]; then
            file img4
          else
            echo "img4 executable was not produced."
            exit 1
          fi

      - name: Prepare Windows artifact
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          mkdir -p dist

          if [ -f img4.exe ]; then
            cp img4.exe dist/img4.exe
          elif [ -f img4 ]; then
            cp img4 dist/img4.exe
          else
            echo "Unable to find img4 executable."
            exit 1
          fi

          echo "Runtime dependencies:"
          ldd dist/img4.exe || true

          ldd dist/img4.exe \
            | awk '/\/mingw64\// { print $3 }' \
            | sort -u \
            | while read -r dll; do
                if [ -n "$dll" ] && [ -f "$dll" ]; then
                  cp "$dll" dist/
                fi
              done

          echo "Artifact contents:"
          ls -lah dist

      - name: Test executable
        shell: msys2 {0}
        run: |
          set -eux

          ./dist/img4.exe 2>&1 || true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: img4-windows-x86_64
          path: dist/
          if-no-files-found: error
          retention-days: 14
